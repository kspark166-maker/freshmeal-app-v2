function blobToB64(b){return new Promise(r=>{const f=new FileReader();f.onload=()=>r(f.result.split(",")[1]);f.readAsDataURL(b);});}
async function capFrame(v){const c=document.createElement("canvas");c.width=v.videoWidth||640;c.height=v.videoHeight||480;c.getContext("2d").drawImage(v,0,0);return new Promise(r=>c.toBlob(b=>r(b),"image/jpeg",0.85));}
async function callClaude(messages,system){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system,messages})});
  const d=await res.json();
  return(d.content?.map(x=>x.text||"").join("")||"").replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
}

/* ══════════════════════════════════════════
   SMART SEARCH BAR  ← NEW
══════════════════════════════════════════ */
function SearchBar({value, onChange, onSearch, onClear, genres, placeholder}){
  const [focused, setFocused] = useState(false);
  const activeGenre = GENRES.find(g=>genres.includes(g.id) && g.id!=="any");
  const accentColor = activeGenre ? activeGenre.bg : "#FF6B35";

  return(
    <div style={{flex:1}}>
      <div style={{
        display:"flex", alignItems:"center", gap:8,
        background:"#fff",
        borderRadius:16,
        border: focused ? `2px solid ${accentColor}` : "2px solid #EDE9E4",
        padding:"0 12px",
        boxShadow: focused ? `0 0 0 3px ${accentColor}18` : "0 2px 8px rgba(0,0,0,0.06)",
        transition:"all 0.2s",
        height:44,
      }}>
        {/* genre color dot or search icon */}
        {activeGenre ? (
          <div style={{width:22,height:22,borderRadius:"50%",background:activeGenre.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>
            {activeGenre.label.split(" ")[0]}
          </div>
        ) : (
          <span style={{fontSize:17,color:"#C0B8B0",flexShrink:0}}>🔍</span>
        )}

        <input
          value={value}
          onChange={e=>onChange(e.target.value)}
          onFocus={()=>setFocused(true)}
          onBlur={()=>setFocused(false)}
          onKeyDown={e=>e.key==="Enter"&&onSearch()}
          placeholder={placeholder}
          style={{
            flex:1, border:"none", outline:"none", fontSize:13, fontWeight:500,
            color:"#1a1a1a", background:"transparent", fontFamily:"'Noto Sans JP',sans-serif",
            minWidth:0,
          }}
        />

        {value ? (
          <button onClick={onClear} style={{flexShrink:0,background:"none",border:"none",fontSize:16,color:"#C0B8B0",cursor:"pointer",padding:"0 2px",lineHeight:1}}>✕</button>
        ) : (
          <span style={{fontSize:14,color:"#D0C8C0",flexShrink:0}}>|</span>
        )}

        <button onClick={onSearch} style={{
          flexShrink:0, background:`linear-gradient(135deg,${accentColor},${accentColor}CC)`,
          border:"none", borderRadius:10, padding:"5px 10px",
          color:"#fff", fontSize:11, fontWeight:800, cursor:"pointer",
          boxShadow:`0 2px 8px ${accentColor}44`,
          fontFamily:"'Noto Sans JP',sans-serif",
          whiteSpace:"nowrap",
        }}>
          検索
        </button>
      </div>
    </div>
  );
}

function RecipeCreateModal({genres, onClose, onDone}){
  const [step, setStep]           = useState(1); // 1=input 2=loading 3=done
  const [recipeName, setRecipeName] = useState("");
  const [freeIngredients, setFreeIngredients] = useState("");
  const [portions, setPortions]   = useState(2);
  const [level, setLevel]         = useState("normal"); // easy/normal/pro
  const [result, setResult]       = useState(null);
  const [inputFocused, setInputFocused] = useState(false);

  const LEVELS = [
    {id:"easy",  label:"簡単",  emoji:"😊", color:"#4CAF50"},
    {id:"normal",label:"普通",  emoji:"👨‍🍳", color:"#FF6B35"},
    {id:"pro",   label:"本格派",emoji:"⭐", color:"#7C3AED"},
  ];

  const handleGenerate = async () => {
    if(!recipeName.trim() && !freeIngredients.trim()) return;
    setStep(2);
    const gl = genres.includes("any")?"お任せ":genres.join(", ");
    const nameHint   = recipeName.trim()    ? `料理名のヒント:「${recipeName}」` : "";
    const ingHint    = freeIngredients.trim()? `使いたい食材:「${freeIngredients}」` : "";
    const levelLabel = LEVELS.find(l=>l.id===level)?.label || "普通";
    try{
      const res = await callClaude([{role:"user", content:
        `以下の条件でオリジナルレシピを1品作成してください。${nameHint} ${ingHint} ジャンル:${gl} 難易度:${levelLabel} 人数:${portions}人分
JSONのみで返してください:
{"name":"料理名","emoji":"絵文字","time":"調理時間","finishEmoji":"完成絵文字","finishDesc":"完成の一言説明","ingredients":[{"name":"食材名","amount":"分量","urgent":false}],"steps":[{"desc":"手順の説明","tip":"ポイント(任意)"}],"nutrition":{"calories":数値,"protein":0-100,"fat":0-100,"carbs":0-100,"vitamins":0-100},"nutritionBalance":"栄養コメント"}`
      }], "プロの料理人。わかりやすく美味しいレシピを提案する。");
      const parsed = JSON.parse(res);
      setResult(parsed);
      setStep(3);
    } catch {
      setResult({
        name: recipeName || "オリジナル炒め", emoji:"🍳", time:"20分",
        finishEmoji:"✨😋", finishDesc:"こんがり美味しく仕上がります",
        ingredients:[{name:"鶏むね肉",amount:"200g"},{name:"野菜類",amount:"適量"},{name:"醤油",amount:"大さじ2"}],
        steps:[{desc:"材料を食べやすい大きさに切る"},{desc:"フライパンで炒めて味付けする",tip:"強火でさっと炒めるのがコツ"},{desc:"盛り付けて完成"}],
        nutrition:{calories:320,protein:65,fat:30,carbs:35,vitamins:55},
        nutritionBalance:"バランスの良い一品です。",
      });
      setStep(3);
    }
  };

  const accentColor = GENRES.find(g=>genres.includes(g.id)&&g.id!=="any")?.bg || "#FF6B35";
  const acs=["#FF6B35","#2D9B6F","#3B6CF6","#D4621A"];

  return(
    <div style={{position:"fixed",inset:0,zIndex:400,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      {/* backdrop */}
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.45)",backdropFilter:"blur(4px)"}}/>

      {/* sheet */}
      <div style={{position:"relative",background:"#FAF8F5",borderRadius:"24px 24px 0 0",maxHeight:"90vh",display:"flex",flexDirection:"column",animation:"sheetUp 0.3s cubic-bezier(.4,0,.2,1)"}}>
        {/* handle */}
        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 0"}}>
          <div style={{width:36,height:4,borderRadius:2,background:"#D8CFC5"}}/>
        </div>

        {/* header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 18px 8px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${accentColor},${accentColor}CC)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:`0 3px 10px ${accentColor}44`}}>📝</div>
            <div>
              <div style={{fontSize:15,fontWeight:900,color:"#1a1a1a",fontFamily:"'Playfair Display',serif"}}>レシピ作成</div>
              <div style={{fontSize:10,color:"#C0B8B0",fontWeight:600}}>AIがオリジナルレシピを生成します</div>
            </div>
          </div>
          <button onClick={onClose} style={{background:"#F0EDE8",border:"none",borderRadius:10,width:30,height:30,fontSize:14,cursor:"pointer",color:"#888",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"0 16px 24px"}}>

          {/* ── STEP 1: INPUT ── */}
          {step===1&&(
            <div style={{animation:"fadeUp 0.2s ease"}}>
              {/* recipe name */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,fontWeight:800,letterSpacing:2,color:"#C8C0B4",textTransform:"uppercase",marginBottom:7}}>作りたい料理名（任意）</div>

                  onFocus={()=>setInputFocused(true)}

    </div>
  );

/* ══════════════════════════════════════════

function IngredientInputPanel({manualIngredients, onAdd, onRemove, onGenerate}){
  const [input, setInput] = useState("");

  const addItem = (name) => {
    const trimmed = name.trim();
    if(!trimmed || manualIngredients.includes(trimmed)) return;
    onAdd(trimmed);
    setInput("");
  };

  return(
    <div style={{marginBottom:10}}>
      <div style={{fontSize:9,fontWeight:800,letterSpacing:2.5,color:"#C8C0B4",textTransform:"uppercase",marginBottom:8,display:"flex",alignItems:"center",gap:5}}>
        <span style={{fontSize:13}}>✏️</span>食 材 を 手 入 力
      </div>

      {/* text input */}
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"){addItem(input);}}}
          placeholder="例：鶏むね肉、トマト..."
          style={{flex:1,border:"1.5px solid #EDE9E4",borderRadius:12,padding:"9px 12px",fontSize:12,color:"#1a1a1a",outline:"none",background:"#fff",fontFamily:"'Noto Sans JP',sans-serif"}}
        />
        <button
          onClick={()=>addItem(input)}
          style={{padding:"9px 14px",borderRadius:12,background:"linear-gradient(135deg,#4CAF50,#2E7D32)",color:"#fff",border:"none",fontSize:12,fontWeight:800,cursor:"pointer",boxShadow:"0 3px 10px rgba(76,175,80,0.35)",whiteSpace:"nowrap"}}
        >
          追加
        </button>
      </div>

      {/* quick tag chips */}
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
        {INGREDIENT_TAGS.map(tag=>(
          <button
            key={tag}
            onClick={()=>addItem(tag)}
            disabled={manualIngredients.includes(tag)}
            style={{
              padding:"4px 10px",borderRadius:100,fontSize:11,fontWeight:600,cursor:"pointer",border:"none",
              background:manualIngredients.includes(tag)?"#E8F5E9":"#F5F5F5",
              color:manualIngredients.includes(tag)?"#2E7D32":"#888",
              transition:"all 0.15s",
            }}
          >
            {manualIngredients.includes(tag) ? "✓ " : ""}{tag}
          </button>
        ))}
      </div>

      {/* selected ingredients */}
      {manualIngredients.length > 0 && (
        <div style={{background:"#F7FDF8",borderRadius:14,padding:"10px 12px",border:"1.5px solid #C8E8CA",marginBottom:8}}>
          <div style={{fontSize:10,color:"#7DBF9A",fontWeight:700,marginBottom:6}}>選択中の食材 ({manualIngredients.length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {manualIngredients.map(ing=>(
              <span
                key={ing}
                style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:100,background:"#fff",border:"1.5px solid #C8E8CA",fontSize:11,fontWeight:700,color:"#2E7D32"}}
              >
                {ing}
                <button onClick={()=>onRemove(ing)} style={{background:"none",border:"none",color:"#A0C8A4",cursor:"pointer",fontSize:12,lineHeight:1,padding:0}}>✕</button>
              </span>
            ))}
          </div>
        </div>
      )}

      {manualIngredients.length > 0 && (
        <button
          onClick={onGenerate}
          style={{width:"100%",padding:"12px 0",borderRadius:14,background:"linear-gradient(135deg,#FF6B35,#FF4500)",color:"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",boxShadow:"0 5px 18px rgba(255,107,53,0.42)",fontFamily:"'Playfair Display',serif",letterSpacing:0.3}}
        >
          🍳 この食材で献立を提案
        </button>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   FINISH IMAGE — Claude API で料理写真URLを取得
══════════════════════════════════════════ */
function FinishImage({recipe, accentColor}){
  const [imgUrl, setImgUrl]   = useState(null);
  const [loading, setLoading] = useState(false);
  const [tried, setTried]     = useState(false);
  const [imgError, setImgError] = useState(false);

  const generate = async () => {
    setLoading(true);
    try {
      // Claude に料理名・説明から Unsplash 検索キーワードを英語で出力させる
      const res = await callClaude(
        [{role:"user", content:
          `料理「${recipe.name}」(${recipe.finishDesc||""}) に最も近い料理写真を Unsplash で検索するための英語キーワードを1〜3語で答えてください。JSONのみで: {"keyword":"japanese stir fry tofu"}`
        }],
        "料理写真の検索キーワード専門家。英語キーワードのみ返す。"
      );
      const kw = JSON.parse(res).keyword || recipe.name;
      const encoded = encodeURIComponent(kw);
      // Unsplash Source API — CORS対応・無料・キー不要
      const url = `https://source.unsplash.com/600x400/?${encoded},food,dish,plated`;
      setImgUrl(url);
    } catch {
      setImgUrl(null);
    }
    setTried(true);
    setLoading(false);
  };

  // まだ生成していない状態
  if(!tried && !loading) return (
    <button
      onClick={generate}
      style={{
        width:"100%", padding:"14px 0", borderRadius:14, marginTop:6,
        background:`linear-gradient(135deg,${accentColor}18,${accentColor}08)`,
        border:`2px dashed ${accentColor}40`,
        color:accentColor, cursor:"pointer",
        display:"flex", alignItems:"center", justifyContent:"center", gap:8,
        fontSize:13, fontWeight:800, transition:"all 0.2s",
        fontFamily:"'Noto Sans JP',sans-serif",
      }}
    >
      <span style={{fontSize:20}}>📸</span>完成イメージを生成する
    </button>
  );

  // 生成中
  if(loading) return (
    <div style={{width:"100%",height:180,borderRadius:14,background:`${accentColor}10`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,marginTop:6,border:`1.5px solid ${accentColor}20`}}>
      <div style={{fontSize:36,animation:"spin 1.5s linear infinite"}}>🍽️</div>
      <div style={{fontSize:12,color:accentColor,fontWeight:700,animation:"pulse 1.5s infinite"}}>画像を生成中…</div>
    </div>
  );

  // 画像エラー or 取得失敗 → 絵文字フォールバック
  if(imgError || !imgUrl) return (
    <div style={{borderRadius:14,padding:"16px",background:`linear-gradient(135deg,${accentColor}14,${accentColor}06)`,border:`1.5px solid ${accentColor}25`,display:"flex",alignItems:"center",gap:12,marginTop:6}}>
      <div style={{fontSize:52,filter:`drop-shadow(0 4px 10px ${accentColor}44)`}}>{recipe.finishEmoji||"✨"}</div>
      <div>
        <div style={{fontSize:11,fontWeight:800,color:accentColor,marginBottom:3}}>完成イメージ</div>
        <div style={{fontSize:12,color:"#555",lineHeight:1.55}}>{recipe.finishDesc}</div>
      </div>
    </div>
  );

  // 画像表示
  return (
    <div style={{borderRadius:14,overflow:"hidden",marginTop:6,position:"relative",boxShadow:`0 6px 24px ${accentColor}30`}}>
      <img
        src={imgUrl}
        alt={recipe.name}
        onError={()=>setImgError(true)}
        style={{width:"100%",height:200,objectFit:"cover",display:"block"}}
      />
      {/* overlay gradient + label */}
      <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.58) 0%,transparent 50%)"}}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"12px 14px",display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
        <div>

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
export default function App(){
  const [tabIdx,setTabIdx]      = useState(0);
  const [dishCount,setDishCount]= useState(2);
  const [genres,setGenres]      = useState(["any"]);
  const [searchText,setSearchText] = useState("");
  const [manualIngredients,setManualIngredients] = useState([]);
  const [showInputPanel,setShowInputPanel] = useState(false);
  const [showCreateModal,setShowCreateModal] = useState(false);

  const [vidStream,setVidStream]= useState(null);
  const [frame,setFrame]        = useState(null);
  const [loading,setLoading]    = useState(false);
  const [loadMsg,setLoadMsg]    = useState("");
  const [ingredients,setIngredients] = useState(null);
  const [recipes,setRecipes]    = useState(null);
  const [shopping,setShopping]  = useState(null);
  const [seasonings,setSeasonings] = useState(null);
  const [capMode,setCapMode]    = useState("fridge");
  const vRef = useRef(null);

  // ── swipe ──
  const swipeStartX=useRef(null);
  const swipeStartY=useRef(null);
  const isDragging=useRef(false);
  const [dragX,setDragX]=useState(0);

  const onTouchStart=useCallback(e=>{swipeStartX.current=e.touches[0].clientX;swipeStartY.current=e.touches[0].clientY;isDragging.current=false;},[]);
  const onTouchMove=useCallback(e=>{
    if(swipeStartX.current==null)return;
    const dx=e.touches[0].clientX-swipeStartX.current;
    const dy=e.touches[0].clientY-swipeStartY.current;
    if(!isDragging.current){if(Math.abs(dx)<Math.abs(dy))return;isDragging.current=true;}
    e.preventDefault();setDragX(dx);
  },[]);
  const onTouchEnd=useCallback(e=>{
    if(!isDragging.current){setDragX(0);return;}
    const dx=e.changedTouches[0].clientX-swipeStartX.current;
    setDragX(0);
    if(Math.abs(dx)>50){if(dx<0)setTabIdx(p=>Math.min(p+1,TABS.length-1));else setTabIdx(p=>Math.max(p-1,0));}
    swipeStartX.current=null;isDragging.current=false;
  },[]);
  const mouseStartX=useRef(null);
  const onMouseDown=useCallback(e=>{mouseStartX.current=e.clientX;},[]);
  const onMouseUp=useCallback(e=>{
    if(mouseStartX.current==null)return;
    const dx=e.clientX-mouseStartX.current;
    if(Math.abs(dx)>60){if(dx<0)setTabIdx(p=>Math.min(p+1,TABS.length-1));else setTabIdx(p=>Math.max(p-1,0));}
    mouseStartX.current=null;
  },[]);

  const tab=TABS[tabIdx];

  const toggleGenre=id=>{
    if(id==="any"){setGenres(["any"]);return;}
    setGenres(p=>{const f=p.filter(g=>g!=="any");const n=f.includes(id)?f.filter(g=>g!==id):[...f,id];return n.length?n:["any"];});
  };

  // search placeholder varies by state
  const searchPlaceholder = (() => {
    const activeGenre = GENRES.find(g=>genres.includes(g.id)&&g.id!=="any");
    if(activeGenre) return `${activeGenre.label} のレシピを検索…`;
    return "メニュー・食材を入力して検索…";
  })();

  // handle search / dish selection
  const handleSearch = async () => {
    if(!searchText.trim()) return;
    setLoading(true); setLoadMsg("レシピを検索中…");
    const gl = genres.includes("any")?"お任せ":genres.join(", ");
    try{
      const res=await callClaude([{role:"user",content:`「${searchText}」に関する${dishCount}品の献立をJSONのみで。ジャンル:${gl}
{"menu":[{"name":"料理名","emoji":"絵文字","time":"調理時間","finishEmoji":"完成絵文字","finishDesc":"完成の一言","urgentIngredients":[],"ingredients":[{"name":"食材","amount":"分量","urgent":false}],"steps":[{"desc":"手順","tip":"コツ(任意)"}],"nutrition":{"calories":数値,"protein":0-100,"fat":0-100,"carbs":0-100,"vitamins":0-100}}],"nutritionBalance":"栄養コメント"}`}],
        "料理の専門家。栄養バランスを重視。");
      setRecipes(JSON.parse(res)); setTabIdx(1);
    }catch{ setRecipes(null); }
    setLoading(false);
  };

  // popular dish tapped
  const handleSelectDish = async (dishName) => {
    setSearchText(dishName);
    setLoading(true); setLoadMsg(`${dishName} のレシピを生成中…`);
    const gl = genres.includes("any")?"お任せ":genres.join(", ");
    try{
      const res=await callClaude([{role:"user",content:`「${dishName}」のレシピを${dishCount}品構成でJSONのみ。ジャンル:${gl}
{"menu":[{"name":"料理名","emoji":"絵文字","time":"調理時間","finishEmoji":"完成絵文字","finishDesc":"完成の一言","urgentIngredients":[],"ingredients":[{"name":"食材","amount":"分量","urgent":false}],"steps":[{"desc":"手順","tip":"コツ(任意)"}],"nutrition":{"calories":数値,"protein":0-100,"fat":0-100,"carbs":0-100,"vitamins":0-100}}],"nutritionBalance":"栄養コメント"}`}],
        "料理の専門家。わかりやすいレシピを提案。");
      setRecipes(JSON.parse(res)); setTabIdx(1);
    }catch{ setRecipes(null); }
    setLoading(false);
  };

  // manual ingredients → recipes
  const genFromManual = async () => {
    setLoading(true); setLoadMsg("献立を考案中…");
    const gl = genres.includes("any")?"お任せ":genres.join(", ");
    const ingList = manualIngredients.join("、");
    try{
      const res=await callClaude([{role:"user",content:`食材「${ingList}」を使った${dishCount}品の献立をJSONのみで。ジャンル:${gl}
{"menu":[{"name":"料理名","emoji":"絵文字","time":"調理時間","finishEmoji":"完成絵文字","finishDesc":"完成の一言","urgentIngredients":[],"ingredients":[{"name":"食材","amount":"分量","urgent":false}],"steps":[{"desc":"手順","tip":"コツ(任意)"}],"nutrition":{"calories":数値,"protein":0-100,"fat":0-100,"carbs":0-100,"vitamins":0-100}}],"nutritionBalance":"栄養コメント"}`}],
        "料理の専門家。指定食材を最大限活用。");
      setRecipes(JSON.parse(res)); setTabIdx(1);
    }catch{ setRecipes(null); }
    setLoading(false);
  };

  const startCam=async mode=>{setCapMode(mode);try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});setVidStream(s);setTimeout(()=>{if(vRef.current)vRef.current.srcObject=s;},80);}catch{alert("カメラの許可が必要です");}};
  const stopCam=()=>{vidStream?.getTracks().forEach(t=>t.stop());setVidStream(null);};
  const capture=async()=>{if(!vRef.current)return;const blob=await capFrame(vRef.current);setFrame({blob,url:URL.createObjectURL(blob),mode:capMode});stopCam();};

  const analyzeFridge=async()=>{
    if(!frame)return;setLoading(true);setLoadMsg("食材を認識中…");
    try{
      const data=await blobToB64(frame.blob);
      const res=await callClaude([{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data}},
        {type:"text",text:'画像から食材を全て特定しJSONのみ:\n{"urgent":[{"name":"食材名","emoji":"絵文字","freshness":"今日中/2-3日以内/1週間以内"}],"normal":[{"name":"食材名","emoji":"絵文字","freshness":"消費目安"}],"shopping":[{"name":"食材名","emoji":"絵文字","reason":"理由"}]}'},
      ]}],"冷蔵庫食材管理の専門家。");
      const p=JSON.parse(res);setIngredients(p);setShopping(p.shopping||[]);
    }catch{
      setIngredients({urgent:[{name:"豆腐",emoji:"🟦",freshness:"今日中"},{name:"もやし",emoji:"🌱",freshness:"2日以内"}],normal:[{name:"鶏むね肉",emoji:"🍗",freshness:"3-4日"},{name:"卵",emoji:"🥚",freshness:"2週間"}],shopping:[{name:"牛乳",emoji:"🥛",reason:"在庫少"}]});
      setShopping([{name:"牛乳",emoji:"🥛",reason:"在庫少"}]);
    }
    setLoading(false);
  };

  const genRecipes=async()=>{
    if(!ingredients)return;setLoading(true);setLoadMsg("献立を考案中…");
    const gl=genres.includes("any")?"お任せ":genres.join(", ");
    const ul=ingredients.urgent?.map(i=>i.name).join(", ")||"";
    const nl=ingredients.normal?.map(i=>i.name).join(", ")||"";
    try{
      const res=await callClaude([{role:"user",content:`冷蔵庫食材から${dishCount}品の献立をJSONのみで。優先食材:${ul} その他:${nl} ジャンル:${gl}
{"menu":[{"name":"料理名","emoji":"絵文字","time":"調理時間","finishEmoji":"完成絵文字","finishDesc":"完成の一言","urgentIngredients":["足が早い食材"],"ingredients":[{"name":"食材","amount":"分量","urgent":true}],"steps":[{"desc":"手順","tip":"コツ(任意)"}],"nutrition":{"calories":数値,"protein":0-100,"fat":0-100,"carbs":0-100,"vitamins":0-100}}],"nutritionBalance":"栄養コメント"}`}],
        "栄養バランスを重視した料理の専門家。足が早い食材を優先。");
      setRecipes(JSON.parse(res));setTabIdx(1);
    }catch{
      setRecipes({menu:[{name:"豆腐ともやしの中華炒め",emoji:"🥢",time:"15分",finishEmoji:"✨🥢😋",finishDesc:"ごま油香るシャキシャキ仕上げ",urgentIngredients:["豆腐","もやし"],ingredients:[{name:"豆腐",amount:"1丁",urgent:true},{name:"もやし",amount:"1袋",urgent:true}],steps:[{desc:"豆腐を水切りして一口大に切る",tip:"電子レンジ2分で時短"},{desc:"フライパンで鶏肉→もやし→豆腐の順に炒める"},{desc:"醤油・ごま油で味を整えて完成",tip:"ネギを散らすと彩りUP"}],nutrition:{calories:280,protein:72,fat:35,carbs:28,vitamins:60}}],nutritionBalance:"たんぱく質・ビタミンのバランスが良好。"});
      setTabIdx(1);
    }
    setLoading(false);
  };

  const analyzeSeas=async()=>{
    if(!frame)return;setLoading(true);setLoadMsg("調味料を認識中…");
    try{const data=await blobToB64(frame.blob);const res=await callClaude([{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data}},{type:"text",text:'調味料をリストアップしJSONのみ:\n{"seasonings":[{"name":"調味料名","emoji":"絵文字","low":true}]}'}]}],"調味料管理の専門家。");setSeasonings(JSON.parse(res).seasonings);}
    catch{setSeasonings([{name:"醤油",emoji:"🫙",low:true},{name:"みりん",emoji:"🍶",low:false},{name:"砂糖",emoji:"🍬",low:false}]);}
    setFrame(null);setLoading(false);
  };
  const handleAnalyze=()=>{if(frame?.mode==="seasoning")analyzeSeas();else analyzeFridge();};

  const CamView=()=>(
    <Card style={{padding:"10px"}}>
      <video ref={vRef} autoPlay playsInline muted style={{width:"100%",display:"block",borderRadius:12,aspectRatio:"4/3",objectFit:"cover"}}/>
      <div style={{display:"flex",justifyContent:"center",marginTop:10}}>
        <button onClick={capture} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 24px",borderRadius:100,background:"linear-gradient(135deg,#FF6B35,#FF4500)",color:"#fff",border:"none",fontSize:13,fontWeight:800,cursor:"pointer",boxShadow:"0 5px 18px rgba(255,107,53,0.4)"}}>
          <span style={{fontSize:16}}>⚡</span>撮影する
        </button>
      </div>
    </Card>
  );
  const Preview=({analyzeLabel})=>(
    <Card style={{padding:"10px"}}>
      <img src={frame.url} alt="" style={{width:"100%",display:"block",borderRadius:12}}/>
      <div style={{display:"flex",gap:8,marginTop:10,justifyContent:"center"}}>
        <button onClick={()=>setFrame(null)} style={{padding:"9px 16px",borderRadius:100,background:"#F0EDE8",color:"#888",border:"none",fontSize:12,fontWeight:700,cursor:"pointer"}}>🔄 撮り直す</button>
        <button onClick={handleAnalyze} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 20px",borderRadius:100,background:"linear-gradient(135deg,#4CAF50,#2E7D32)",color:"#fff",border:"none",fontSize:12,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 14px rgba(76,175,80,0.4)"}}>
          <span style={{fontSize:14}}>🔍</span>{analyzeLabel}
        </button>
      </div>
    </Card>
  );

  const clampedDrag=Math.max(-60,Math.min(60,dragX));

  return(
    <div style={{minHeight:"100vh",background:"#FAF8F5",fontFamily:"'Noto Sans JP',sans-serif",overflowX:"hidden",display:"flex",flexDirection:"column"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Noto+Sans+JP:wght@400;500;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{display:none;}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}
        @keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
        @keyframes floatBob{from{transform:translateY(0)}to{transform:translateY(-9px)}}
        @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        input::placeholder{color:#C8C0B4;}
      `}</style>

      {loading&&<Loading msg={loadMsg}/>}

      <div style={{maxWidth:480,width:"100%",margin:"0 auto",display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",position:"relative"}}>

        {/* ── HERO ── */}
        <HeroHeader/>

        {/* ── SMART SEARCH BAR + CREATE BUTTON ── */}
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px 6px",background:"#FAF8F5",flexShrink:0}}>
          <div style={{flex:1}}>
            <SearchBar
              value={searchText}
              onChange={setSearchText}
              onSearch={handleSearch}
              onClear={()=>setSearchText("")}
              genres={genres}
              placeholder={searchPlaceholder}
            />
          </div>
          <button
            onClick={()=>setShowCreateModal(true)}
            style={{
              flexShrink:0,
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,
              padding:"0 10px",
              borderRadius:14,
              background:"linear-gradient(135deg,#7C3AED,#5B21B6)",
              border:"none",
              color:"#fff",
              fontSize:9,fontWeight:800,
              cursor:"pointer",
              boxShadow:"0 4px 14px rgba(124,58,237,0.42)",
              height:44,minWidth:58,
              fontFamily:"'Noto Sans JP',sans-serif",
              transition:"transform 0.15s",
            }}
          >
            <span style={{fontSize:17}}>📝</span>
            <span style={{letterSpacing:0.3}}>レシピ作成</span>
          </button>
        </div>

        {/* ── RECIPE CREATE MODAL ── */}
        {showCreateModal&&(
          <RecipeCreateModal
            genres={genres}
            onClose={()=>setShowCreateModal(false)}
            onDone={newRecipe=>{
              setRecipes(prev=>{
                const base = prev || {menu:[],nutritionBalance:""};
                return {...base, menu:[...(base.menu||[]), {...newRecipe, urgentIngredients:[]}]};
              });
              setTabIdx(1);
            }}
          />
        )}

        {/* ── SWIPE DOTS + TAB LABEL ── */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"3px 12px 5px",background:"#FAF8F5",flexShrink:0}}>
          {TABS.map((_,i)=>(
            <div key={i} onClick={()=>setTabIdx(i)} style={{width:tabIdx===i?18:6,height:6,borderRadius:3,background:tabIdx===i?"#FF6B35":"#D8CFC5",transition:"all 0.28s",cursor:"pointer"}}/>
          ))}
          <div style={{fontSize:9,color:"#D0C8C0",letterSpacing:1,marginLeft:4}}>
            {tabIdx>0&&"← "}スワイプ{tabIdx<TABS.length-1&&" →"}
          </div>
        </div>

        {/* ── SWIPEABLE CONTENT ── */}
        <div
          onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
          onMouseDown={onMouseDown} onMouseUp={onMouseUp}
          style={{flex:1,overflowY:"auto",overflowX:"hidden",padding:"0 12px 80px",transform:`translateX(${clampedDrag*0.12}px)`,transition:isDragging.current?"none":"transform 0.15s",userSelect:"none"}}
        >

          {/* ══ COOK ══ */}
          {tab==="cook"&&(
            <div style={{animation:"slideIn 0.26s ease"}}>

              {/* レシピ作成バナー */}
              <button
                onClick={()=>setShowCreateModal(true)}
                style={{
                  width:"100%",marginTop:8,marginBottom:10,
                  padding:"11px 16px",borderRadius:16,
                  background:"linear-gradient(135deg,#7C3AED 0%,#5B21B6 100%)",
                  border:"none",color:"#fff",cursor:"pointer",
                  display:"flex",alignItems:"center",gap:10,
                  boxShadow:"0 5px 18px rgba(124,58,237,0.38)",
                  transition:"transform 0.15s,box-shadow 0.15s",
                }}
              >
                <div style={{width:36,height:36,borderRadius:11,background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>📝</div>
                <div style={{textAlign:"left",flex:1}}>
                  <div style={{fontSize:13,fontWeight:800,letterSpacing:0.3}}>オリジナルレシピを作成</div>
                  <div style={{fontSize:10,opacity:0.75,marginTop:1}}>料理名や食材を入力してAIがレシピを生成</div>
                </div>
                <div style={{fontSize:14,opacity:0.6}}>→</div>
              </button>

              {/* 品数 */}
              <div style={{marginTop:6,marginBottom:8}}>
                <SLabel icon="🍽️">品 数 を 選 ぶ</SLabel>
                <div style={{display:"flex",gap:7}}>
                  {DISH_COUNTS.map(d=><DishBtn key={d.n} d={d} selected={dishCount===d.n} onClick={()=>setDishCount(d.n)}/>)}
                </div>
              </div>

              {/* ジャンル */}
              <div style={{marginBottom:8}}>
                <SLabel icon="🌍">食 べ た い ジ ャ ン ル</SLabel>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  {GENRES.map(g=><GenreBtn key={g.id} g={g} selected={genres.includes(g.id)} onToggle={toggleGenre}/>)}
                </div>
              </div>

              {/* 人気献立 OR 検索結果 */}
              {!searchText && (
                <PopularSection genres={genres} onSelectDish={handleSelectDish}/>
              )}

              {/* 手入力トグル */}
              <div style={{marginBottom:8}}>
                <button
                  onClick={()=>setShowInputPanel(p=>!p)}
                  style={{width:"100%",padding:"9px 14px",borderRadius:13,background:showInputPanel?"#FFF0EB":"#fff",border:showInputPanel?"1.5px solid #FFCDB8":"1.5px solid #EDE9E4",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",fontSize:12,fontWeight:700,color:showInputPanel?"#FF6B35":"#888",transition:"all 0.2s"}}
                >
                  <span>✏️ 食材を手入力して献立を作る {manualIngredients.length>0&&`(${manualIngredients.length}点選択中)`}</span>
                  <span style={{transition:"transform 0.3s",transform:showInputPanel?"rotate(180deg)":"rotate(0deg)",fontSize:10}}>▼</span>
                </button>
                {showInputPanel&&(
                  <div style={{background:"#fff",borderRadius:"0 0 13px 13px",border:"1.5px solid #FFCDB8",borderTop:"none",padding:"12px 12px 10px",animation:"fadeUp 0.2s ease"}}>
                    <IngredientInputPanel
                      manualIngredients={manualIngredients}
                      onAdd={name=>setManualIngredients(p=>[...p,name])}
                      onRemove={name=>setManualIngredients(p=>p.filter(x=>x!==name))}
                      onGenerate={genFromManual}
                    />
                  </div>
                )}
              </div>

              {/* カメラ撮影 */}
              <div style={{marginBottom:8}}>
                <SLabel icon="📹">冷 蔵 庫 を 撮 影</SLabel>
                {!vidStream&&!frame&&(
                  <button onClick={()=>startCam("fridge")} style={{width:"100%",padding:"13px 0",borderRadius:14,border:"2px dashed #D8CFC5",background:"linear-gradient(145deg,#FFF8F4,#FFF3EE)",display:"flex",alignItems:"center",justifyContent:"center",gap:12,cursor:"pointer"}}>
                    <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#FF6B35,#FF4500)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,boxShadow:"0 5px 14px rgba(255,107,53,0.4)"}}>📷</div>
                    <div style={{textAlign:"left"}}>
                      <div style={{fontSize:13,fontWeight:800,color:"#FF6B35"}}>タップしてカメラ起動</div>
                      <div style={{fontSize:10,color:"#C0B0A0",marginTop:1}}>冷蔵庫・冷凍庫を映してください</div>
                    </div>
                  </button>
                )}
                {vidStream&&<CamView/>}
                {frame?.mode==="fridge"&&<Preview analyzeLabel="食材を分析する"/>}
              </div>

              {/* 食材結果 */}
              {ingredients&&(
                <Card>
                  <SLabel icon="⚡">優 先 使 用 食 材</SLabel>
                  {ingredients.urgent?.map((item,i)=><IChip key={i} item={item} urgent/>)}
                  <div style={{height:1,background:"#F5F0EA",margin:"8px 0"}}/>
                  <SLabel icon="🥬">そ の 他 の 食 材</SLabel>
                  {ingredients.normal?.map((item,i)=><IChip key={i} item={item}/>)}
                  <div style={{display:"flex",justifyContent:"center",marginTop:12}}>
                    <button onClick={genRecipes} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 26px",borderRadius:100,background:"linear-gradient(135deg,#FF6B35,#FF4500)",color:"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",boxShadow:"0 6px 20px rgba(255,107,53,0.43)",fontFamily:"'Playfair Display',serif"}}>
                      🍳 献立を提案してもらう
                    </button>
                  </div>
                </Card>
              )}
            </div>
          )}

          {/* ══ RECIPES ══ */}
          {tab==="recipes"&&(
            <div style={{animation:"slideIn 0.26s ease",paddingTop:6}}>
              {!recipes?(
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 0",gap:10}}>
                  <div style={{fontSize:48}}>🍳</div>
                  <div style={{fontWeight:700,color:"#C0B8B0",fontSize:13,textAlign:"center"}}>まず食材を分析または<br/>メニューを検索してください</div>
                  <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap",justifyContent:"center"}}>
                    <button onClick={()=>setTabIdx(0)} style={{padding:"9px 18px",borderRadius:100,background:"#F0EDE8",color:"#888",border:"none",fontSize:12,fontWeight:700,cursor:"pointer"}}>← ご飯作るへ</button>
                    <button onClick={()=>setShowCreateModal(true)} style={{padding:"9px 18px",borderRadius:100,background:"linear-gradient(135deg,#7C3AED,#5B21B6)",color:"#fff",border:"none",fontSize:12,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 14px rgba(124,58,237,0.38)",display:"flex",alignItems:"center",gap:5}}>
                      <span>📝</span>レシピを作成する
                    </button>
                  </div>
                </div>
              ):(
                <div>
                  <div style={{background:"linear-gradient(135deg,#E8F5E9,#F1F8E9)",borderRadius:14,padding:"9px 12px",marginBottom:10,border:"1.5px solid #C8E8CA",display:"flex",gap:8}}>
                    <span style={{fontSize:15}}>📊</span>
                    <div style={{fontSize:12,color:"#2E7D32",fontWeight:600,lineHeight:1.6}}>{recipes.nutritionBalance}</div>
                  </div>
                  {recipes.menu?.map((r,i)=><RecipeCard key={i} recipe={r} index={i}/>)}
                  {/* レシピに追加ボタン */}
                  <button
                    onClick={()=>setShowCreateModal(true)}
                    style={{
                      width:"100%",padding:"13px 0",borderRadius:16,marginTop:4,marginBottom:8,
                      background:"linear-gradient(135deg,#7C3AED,#5B21B6)",
                      border:"none",color:"#fff",cursor:"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center",gap:8,
                      boxShadow:"0 5px 18px rgba(124,58,237,0.38)",
                      fontSize:13,fontWeight:800,
                      fontFamily:"'Noto Sans JP',sans-serif",
                    }}
                  >
                    <span style={{fontSize:18}}>📝</span>さらにレシピを追加作成
                  </button>
                </div>
              )}
            </div>
          )}

          {/* ══ SHOPPING ══ */}
          {tab==="shopping"&&(
            <div style={{animation:"slideIn 0.26s ease",paddingTop:6}}>
              <ShoppingTab list={shopping}/>
            </div>
          )}

          {/* ══ SEASONING ══ */}
          {tab==="seasoning"&&(
            <div style={{animation:"slideIn 0.26s ease",paddingTop:6}}>
              <SeasoningTab seasonings={seasonings} onCapture={()=>startCam("seasoning")}/>
              {vidStream&&tab==="seasoning"&&<CamView/>}
              {frame?.mode==="seasoning"&&<Preview analyzeLabel="調味料を認識"/>}
            </div>
          )}
        </div>

        {/* ══ TAB BAR ══ */}
        <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(255,255,255,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid #EDE9E4",display:"flex",justifyContent:"space-around",padding:"7px 0 18px",zIndex:100,boxShadow:"0 -3px 14px rgba(0,0,0,0.06)"}}>
          {TAB_META.map((t,i)=>{
            const a=tabIdx===i;
            return(
              <button key={t.id} onClick={()=>setTabIdx(i)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:a?"#FFF2ED":"none",border:a?"1.5px solid #FFCDB8":"1.5px solid transparent",borderRadius:12,padding:"5px 14px",color:a?"#FF6B35":"#C0B8B0",fontSize:9,fontWeight:a?800:500,cursor:"pointer",transition:"all 0.2s",minWidth:58}}>
                <span style={{fontSize:21,filter:a?"none":"grayscale(40%)"}}>{t.icon}</span>
                <span>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<React.StrictMode><App /></React.StrictMode>);
</script>
</body>
</html>
